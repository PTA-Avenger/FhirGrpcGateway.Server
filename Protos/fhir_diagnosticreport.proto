syntax = "proto3";
option csharp_namespace = "FhirGrpcGateway.Server";
import "google/protobuf/timestamp.proto";
import "./common.proto";
import "common.proto";

service DiagnosticReportApi {
  rpc GetPatientReports (ReportListRequest) returns (ReportListResponse);
}

message ReportListRequest {
  string patient_id = 1;
  string category = 2; // LAB | RX (Radiology)
}

message DiagnosticReportResponse {
  string id = 1;
  string status = 2; // preliminary | final | amended
  fhir.common.CodeableConcept code = 3; // Name of report (e.g., "Complete Blood Count")
  fhir.common.Reference subject = 4;
  
  google.protobuf.Timestamp effective_date_time = 5;
  google.protobuf.Timestamp issued = 6;
  
  repeated fhir.common.Reference result = 7; // References to Observation IDs
  string conclusion = 8;                      // Summary text for MCP AI to read
}

message ReportListResponse { repeated DiagnosticReportResponse reports = 1; }

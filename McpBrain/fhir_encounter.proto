syntax = "proto3";
option csharp_namespace = "FhirGrpcGateway.Server";
import "google/protobuf/timestamp.proto";

import "common.proto";

service EncounterApi {
  rpc GetPatientEncounters (EncounterListRequest) returns (EncounterListResponse);
}

message EncounterListRequest {
  string patient_id = 1;
  google.protobuf.Timestamp date_from = 2;
}

message EncounterResponse {
  string id = 1;
  string status = 2; // planned, in-progress, finished
  common.Coding class = 3;  // inpatient, outpatient, emergency
  repeated common.CodeableConcept type = 4; // e.g., "Follow up"
  string subject_id = 5;
  
  // Period of the visit
  google.protobuf.Timestamp start = 6;
  google.protobuf.Timestamp end = 7;
  
  // The reason for the visit (helps MCP explain context)
  repeated common.CodeableConcept reason_code = 8;
  string location_display = 9; 
}

message EncounterListResponse { repeated EncounterResponse encounters = 1; }
